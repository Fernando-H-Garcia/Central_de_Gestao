name: Build e Validação

on:
  push:
    branches: [main, staging, release/*]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente de release"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

env:
  ENVIRONMENT: ${{ github.ref_name == 'main' && 'production' || github.ref_name == 'staging' && 'staging' || 'development' }}
  FREEZE_MODE: ${{ vars.FREEZE_MODE || 'false' }}

jobs:
  build:
    name: Build + Smoke Test
    runs-on: windows-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      build_ok: ${{ steps.build.outcome }}
      smoke_ok: ${{ steps.smoke.outcome }}
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          pip install pyinstaller PySide6==6.6.3.1 Markdown

      - name: 🔒 Feature Freeze Check
        if: env.FREEZE_MODE == 'true'
        shell: pwsh
        run: |
          $msg = git log -1 --format="%s" HEAD
          if ($msg -notmatch '^(FIX|BUILD|chore|docs)') {
            Write-Host "::error::FREEZE MODE ATIVO - Apenas FIX/BUILD/chore/docs permitidos"
            Write-Host "  Commit: $msg"
            exit 1
          }
          Write-Host "  Freeze mode: commit permitido"

      - name: 🔒 Validar requirements.lock
        shell: pwsh
        run: |
          if (Test-Path "requirements.lock") {
            $current = pip freeze
            $locked = Get-Content "requirements.lock" | Where-Object { $_ -match '==' }
            $ok = $true
            foreach ($line in $locked) {
              $pkg = ($line -split '==')[0]
              if ($current -notmatch [regex]::Escape($line)) {
                Write-Host "::warning::Pacote divergente: esperado $line"
                $ok = $false
              }
            }
            if ($ok) { Write-Host "  requirements.lock: OK" }
            else { Write-Host "  requirements.lock: divergencias detectadas (warning)" }
          }

      - name: Environment Fingerprint
        run: python scripts/build/env_fingerprint.py --save

      - name: Obter versão
        id: get_version
        shell: pwsh
        run: |
          $v = python scripts/build/version.py
          echo "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build Release
        id: build
        run: python scripts/build/build_release.py

      - name: Smoke Test Suite
        id: smoke
        run: python scripts/tests/smoke_test.py

      - name: Release Gate
        if: steps.smoke.outcome != 'success'
        run: |
          echo "::error::SMOKE TEST FALHOU - Release BLOQUEADA"
          echo "::error::Corrija os erros antes de tentar novamente"
          exit 1

      - name: Upload artefato (bundle)
        uses: actions/upload-artifact@v4
        with:
          name: CentralDeGestao-Bundle-${{ env.ENVIRONMENT }}
          path: build/dist/CentralDeGestao/

  installer:
    name: Instalador
    runs-on: windows-latest
    needs: build
    if: success() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging' || startsWith(github.ref, 'refs/heads/release/'))
    steps:
      - uses: actions/checkout@v4

      - name: Baixar artefato do build
        uses: actions/download-artifact@v4
        with:
          name: CentralDeGestao-Bundle-${{ env.ENVIRONMENT }}
          path: build/dist/CentralDeGestao/

      - name: Instalar Inno Setup
        run: |
          choco install innosetup --no-progress --confirm

      - name: Build Installer
        shell: pwsh
        run: |
          $version = "${{ needs.build.outputs.version }}"
          $shortVer = $version -replace '\.\d+$', ''
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion="$shortVer" `
            build/installer.iss

      - name: Validar instalador
        run: python scripts/tests/validate_installer.py

      - name: Upload artefato (instalador)
        uses: actions/upload-artifact@v4
        with:
          name: CentralDeGestao-Installer-${{ env.ENVIRONMENT }}
          path: build/*.exe

  release:
    name: Publicar Release
    runs-on: windows-latest
    needs: [build, installer]
    if: success() && github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Baixar instalador
        uses: actions/download-artifact@v4
        with:
          name: CentralDeGestao-Installer-production
          path: build/

      - name: Criar Release no GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          files: build/CentralDeGestao_Installer.exe
          generate_release_notes: true
