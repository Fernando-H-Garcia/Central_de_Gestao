name: Build e Validação

on:
  push:
    branches: [main, develop, release/*]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build + Smoke Test
    runs-on: windows-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      build_ok: ${{ steps.build.outcome }}
      smoke_ok: ${{ steps.smoke.outcome }}
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          pip install pyinstaller PySide6==6.6.3.1 Markdown

      - name: Obter versão
        id: get_version
        shell: pwsh
        run: |
          $v = python scripts/build/version.py
          echo "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build Release
        id: build
        run: python scripts/build/build_release.py

      - name: Smoke Test
        id: smoke
        run: python scripts/tests/smoke_test.py

      - name: Upload artefato (bundle)
        uses: actions/upload-artifact@v4
        with:
          name: CentralDeGestao-Bundle
          path: build/dist/CentralDeGestao/

  installer:
    name: Instalador
    runs-on: windows-latest
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
    steps:
      - uses: actions/checkout@v4

      - name: Baixar artefato do build
        uses: actions/download-artifact@v4
        with:
          name: CentralDeGestao-Bundle
          path: build/dist/CentralDeGestao/

      - name: Instalar Inno Setup
        run: |
          choco install innosetup --no-progress --confirm

      - name: Build Installer
        shell: pwsh
        run: |
          $version = "${{ needs.build.outputs.version }}"
          $shortVer = $version -replace '\.\d+$', ''
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion="$shortVer" `
            build/installer.iss

      - name: Validar instalador
        run: python scripts/tests/validate_installer.py

      - name: Upload artefato (instalador)
        uses: actions/upload-artifact@v4
        with:
          name: CentralDeGestao-Installer
          path: build/*.exe

  release:
    name: Publicar Release
    runs-on: windows-latest
    needs: [build, installer]
    if: startsWith(github.ref, 'refs/heads/release/') && success()
    steps:
      - uses: actions/checkout@v4

      - name: Baixar instalador
        uses: actions/download-artifact@v4
        with:
          name: CentralDeGestao-Installer
          path: build/

      - name: Criar Release no GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          files: build/CentralDeGestao_Installer.exe
          generate_release_notes: true
