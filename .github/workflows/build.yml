name: Build e Validação

on:
  push:
    branches: [main, develop, release/*]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build + Smoke Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          pip install pyinstaller PySide6==6.6.3.1 Markdown

      - name: Build Release
        run: python scripts/build/build_release.py

      - name: Smoke Test
        run: python scripts/tests/smoke_test.py

      - name: Upload artefato
        uses: actions/upload-artifact@v4
        with:
          name: CentralDeGestao-Build
          path: build/dist/CentralDeGestao/
